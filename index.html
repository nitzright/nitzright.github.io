<!DOCTYPE html>
<html>
<head>
  <title>Nitesh Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #0f0f0f, #1a1a2e);
      color: white;
      overflow-x: hidden;
    }

    /* SNOW CANVAS */
    #snow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    section {
      padding: 120px 20px;
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin-top: 40px;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 10px #00f, 0 0 30px #0ff;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(45deg, #00f, #0ff);
      border-radius: 30px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.15);
    }

    /* Cursor */
    .cursor {
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<canvas id="snow"></canvas>
<div class="cursor"></div>

<!-- HERO -->
<section data-aos="fade-up">
  <h1>Hi, I'm Nitesh ⚡</h1>
  <p>I build modern, minimal & creative web experiences.</p>
  <a href="#projects" class="btn">View Work</a>
</section>

<!-- ABOUT -->
<section id="about" data-aos="fade-up">
  <h2>About Me</h2>
  <p>I am a solo creator who loves tech, design, and internet.</p>
</section>

<!-- PROJECTS -->
<section id="projects" data-aos="fade-up">
  <h2>My Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Portfolio Website</h3>
      <p>Modern animated portfolio.</p>
    </div>
    <div class="card">
      <h3>Landing Page</h3>
      <p>High-converting design.</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section data-aos="fade-up">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();
</script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
gsap.from("h1", { y: -50, opacity: 0, duration: 1 });
gsap.from("p", { opacity: 0, delay: 0.5, duration: 1 });
</script>

<!-- CURSOR -->
<script>
document.addEventListener("mousemove", (e) => {
  const cursor = document.querySelector(".cursor");
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});
</script>

<!-- 🎬 CINEMATIC SNOW -->
<script>
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

let w = window.innerWidth;
let h = window.innerHeight;

canvas.width = w;
canvas.height = h;

let snowflakes = [];

for (let i = 0; i < 250; i++) {
  snowflakes.push({
    x: Math.random() * w,
    y: Math.random() * h,
    r: Math.random() * 4 + 1,
    speed: Math.random() * 1 + 0.5,
    opacity: Math.random(),
    drift: Math.random() * 0.5
  });
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  for (let f of snowflakes) {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255," + f.opacity + ")";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "white";
    ctx.fill();
  }

  update();
}

function update() {
  for (let f of snowflakes) {
    f.y += f.speed;
    f.x += Math.sin(f.y * 0.01) * f.drift;

    if (f.y > h) {
      f.y = 0;
      f.x = Math.random() * w;
    }
  }
}

setInterval(draw, 25);

window.addEventListener("resize", () => {
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w;
  canvas.height = h;
});
</script>

</body>
</html>
